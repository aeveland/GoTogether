<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTogether - Railway Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: 500;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .ready { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        
        .results {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .results pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            color: #495057;
        }
        
        .tab-btn {
            background: #f8f9fa;
            color: #495057;
            border: 1px solid #dee2e6;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: #e9ecef;
        }
        
        .step {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 GoTogether</h1>
        <p class="subtitle">Railway Edition - Built for Success <span class="step">STEP 1</span></p>
        
        <div id="status" class="status ready">
            ✅ Server is running! Ready to test database connection.
        </div>
        
        <div>
            <button onclick="testHealth()">Test Server Health</button>
            <button onclick="testDB()">Test Database</button>
            <button onclick="showAuth()">Test Authentication</button>
            <button onclick="location.reload()">Refresh</button>
        </div>
        
        <!-- Authentication Form -->
        <div id="authSection" style="display: none; margin-top: 30px; border-top: 2px solid #e9ecef; padding-top: 30px;">
            <h3>🔐 Authentication Testing</h3>
            
            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <button onclick="showSignup()" id="signupTab" class="tab-btn">Sign Up</button>
                <button onclick="showLogin()" id="loginTab" class="tab-btn">Login</button>
                <button onclick="testProtected()" id="protectedTab" class="tab-btn">Test Protected Route</button>
            </div>
            
            <!-- Signup Form -->
            <div id="signupForm" style="display: none;">
                <h4>Create Account</h4>
                <input type="text" id="signupName" placeholder="Full Name" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px;">
                <input type="email" id="signupEmail" placeholder="Email" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px;">
                <input type="password" id="signupPassword" placeholder="Password" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px;">
                <button onclick="signup()" style="width: 100%; margin-top: 10px;">Create Account</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" style="display: none;">
                <h4>Login</h4>
                <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px;">
                <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px;">
                <button onclick="login()" style="width: 100%; margin-top: 10px;">Login</button>
            </div>
            
            <!-- Protected Route Test -->
            <div id="protectedForm" style="display: none;">
                <h4>Test Protected Route</h4>
                <p>JWT Token: <span id="currentToken" style="font-family: monospace; font-size: 12px; color: #666;">None</span></p>
                <button onclick="getProfile()" style="width: 100%;">Get My Profile</button>
            </div>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        // Show that page loaded
        console.log('✅ GoTogether Railway Edition loaded successfully!');
        
        async function testHealth() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            statusDiv.className = 'status loading';
            statusDiv.textContent = '🔄 Testing server health...';
            
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Server health check passed!';
                    resultsDiv.innerHTML = `<div class="results"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                } else {
                    throw new Error('Health check failed');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Server health check failed: ${error.message}`;
                resultsDiv.innerHTML = '';
            }
        }
        
        async function testDB() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            statusDiv.className = 'status loading';
            statusDiv.textContent = '🔄 Testing database connection...';
            
            try {
                const response = await fetch('/api/test-db');
                const data = await response.json();
                
                if (response.ok && data.success) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Database connection successful!';
                    resultsDiv.innerHTML = `<div class="results"><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                } else {
                    throw new Error(data.error || 'Database test failed');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ Database connection failed: ${error.message}`;
                resultsDiv.innerHTML = '';
            }
        }
        
        // Auto-test health on load
        setTimeout(testHealth, 1000);
        
        // Store JWT token
        let authToken = localStorage.getItem('authToken') || null;
        
        // Show/hide authentication section
        function showAuth() {
            const authSection = document.getElementById('authSection');
            authSection.style.display = authSection.style.display === 'none' ? 'block' : 'none';
            updateTokenDisplay();
        }
        
        // Tab functions
        function showSignup() {
            hideAllForms();
            document.getElementById('signupForm').style.display = 'block';
            setActiveTab('signupTab');
        }
        
        function showLogin() {
            hideAllForms();
            document.getElementById('loginForm').style.display = 'block';
            setActiveTab('loginTab');
        }
        
        function testProtected() {
            hideAllForms();
            document.getElementById('protectedForm').style.display = 'block';
            setActiveTab('protectedTab');
            updateTokenDisplay();
        }
        
        function hideAllForms() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('protectedForm').style.display = 'none';
        }
        
        function setActiveTab(activeId) {
            ['signupTab', 'loginTab', 'protectedTab'].forEach(id => {
                const btn = document.getElementById(id);
                if (id === activeId) {
                    btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    btn.style.color = 'white';
                } else {
                    btn.style.background = '#f8f9fa';
                    btn.style.color = '#495057';
                }
            });
        }
        
        function updateTokenDisplay() {
            const tokenSpan = document.getElementById('currentToken');
            if (authToken) {
                tokenSpan.textContent = authToken.substring(0, 20) + '...';
                tokenSpan.style.color = '#28a745';
            } else {
                tokenSpan.textContent = 'None';
                tokenSpan.style.color = '#666';
            }
        }
        
        // Signup function
        async function signup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (!name || !email || !password) {
                showResult('error', 'Please fill in all fields');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken);
                    showResult('success', `Account created! Welcome ${data.user.name}`);
                    updateTokenDisplay();
                } else {
                    showResult('error', data.error);
                }
            } catch (error) {
                showResult('error', 'Network error: ' + error.message);
            }
        }
        
        // Login function
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showResult('error', 'Please fill in all fields');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken);
                    showResult('success', `Welcome back, ${data.user.name}!`);
                    updateTokenDisplay();
                } else {
                    showResult('error', data.error);
                }
            } catch (error) {
                showResult('error', 'Network error: ' + error.message);
            }
        }
        
        // Get profile function
        async function getProfile() {
            if (!authToken) {
                showResult('error', 'Please login first');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('success', 'Profile retrieved successfully!');
                    document.getElementById('results').innerHTML += `<div class="results"><pre>${JSON.stringify(data.user, null, 2)}</pre></div>`;
                } else {
                    showResult('error', data.error);
                    if (response.status === 401 || response.status === 403) {
                        authToken = null;
                        localStorage.removeItem('authToken');
                        updateTokenDisplay();
                    }
                }
            } catch (error) {
                showResult('error', 'Network error: ' + error.message);
            }
        }
        
        function showResult(type, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
        }
    </script>
</body>
</html>
